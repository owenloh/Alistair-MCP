# Railway deployment config. Railway auto-detects Python via Nixpacks,
# installs requirements.txt, and runs the start command below.
# (A Procfile is also included as a fallback; railway.toml takes precedence.)

[build]
builder = "nixpacks"

[deploy]
# app.main:asgi = the MCP dispatcher wrapping the FastAPI app (serves /mcp directly).
# --proxy-headers + --forwarded-allow-ips=* so Railway's X-Forwarded-Proto (https)
# is honoured (correct scheme in any generated URLs; required for OAuth metadata).
startCommand = "uvicorn app.main:asgi --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips=*"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
